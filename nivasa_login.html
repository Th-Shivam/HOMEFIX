<body class="bg-[#05070a] text-on-surface font-body-md overflow-hidden antialiased subpixel-antialiased" style="text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
<!-- Cinematic Architecture Background -->
<div class="fixed inset-0 z-0">
<img alt="Luxury penthouse interior at blue hour" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCN8IQMQ5vYKS81P7jHLgbd8YI9Gzq7UU33QZrBhESPo8MHIwQUx4KSaaTByBGtmr_6ufzvF_oK_BTOSpsyvjERBZoko0UNVrsJw3bJX5AT8BVul-ItoL7CcOLNDCPHTcmAvRhaswd0vkDSL-h0GNIxH5hdTjlA4nh8q6iSDZ4tAa1u6LmAnO_g6wRF9i7gkHK_vrLT0sJP_bgr-zvDX6a4nCs94LjWJF70-zi7cgZif8YjbgSoRFxUmJL-GwO2UVFPB4MlPi5BaU-D"/>
<!-- Depth Falloff Gradients matching Onboarding -->
<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/40"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,transparent_0%,rgba(0,0,0,0.5)_100%)]"></div>
<div class="absolute inset-0 bg-noise pointer-events-none"></div>
</div>
<!-- Top AppBar -->
<nav class="relative z-50 w-full flex justify-between items-center px-8 pt-16 pb-6">
<div class="font-display-xl tracking-[0.4em] text-white/90 uppercase font-light text-[11px]">NIVASA</div>
<button class="font-label-sm text-[10px] uppercase text-white/40 hover:text-white transition-colors flex items-center gap-1.5 duration-500">
            HELP
            <span class="material-symbols-outlined !text-[16px]">help_outline</span>
</button>
</nav>
<!-- Main Content -->
<main class="relative z-10 flex flex-col items-center justify-center h-[calc(100vh-160px)] px-8">
<div class="max-w-[340px] w-full space-y-12">
<!-- Headline Group -->
<div class="text-center space-y-4">
<h1 class="font-display-xl text-white leading-[1.1] tracking-[-0.015em] font-extralight text-[34px] text-shadow-elegant">Welcome Back.</h1>
<p class="font-body-md text-sm text-white/50 leading-relaxed font-light">Access your residence management experience.</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-4">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-sm text-[10px] text-white/40 ml-1 uppercase tracking-[0.1em]">RESIDENCE ID / EMAIL</label>
<div class="ambient-card backdrop-blur-xl flex items-center rounded-2xl h-14 px-5 transition-all duration-700 focus-within:bg-white/[0.04] focus-within:border-white/10 group">
<input class="w-full bg-transparent border-none focus:ring-0 text-white placeholder:text-white/20 font-body-md text-sm font-light" placeholder="name@domain.com" type="email"/>
<span class="material-symbols-outlined text-white/30 group-focus-within:text-white/50 transition-colors">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-sm text-[10px] text-white/40 ml-1 uppercase tracking-[0.1em]">SECURITY KEY</label>
<div class="ambient-card backdrop-blur-xl flex items-center rounded-2xl h-14 px-5 transition-all duration-700 focus-within:bg-white/[0.04] focus-within:border-white/10 group">
<input class="w-full bg-transparent border-none focus:ring-0 text-white placeholder:text-white/20 font-body-md text-sm font-light" placeholder="••••••••" type="password"/>
<button class="text-white/30 hover:text-white/70 transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Action Section -->
<div class="pt-6 space-y-10">
<button class="relative overflow-hidden bg-gradient-to-b from-[#2A2A2A] to-[#1A1A1A] w-full h-[52px] rounded-xl flex items-center justify-center gap-5 active:scale-[0.97] transition-all duration-300 metallic-edge group">
<div class="absolute inset-0 bg-gradient-to-tr from-white/5 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="text-[11px] text-white/90 tracking-[0.35em] uppercase font-semibold">SIGN IN</span>
</button>
<div class="flex flex-col items-center gap-6">
<button class="font-label-sm text-[10px] text-white/40 hover:text-white transition-colors tracking-[0.2em] uppercase font-medium" type="button">
                            Forgot Password?
                        </button>
<div class="h-[1px] w-8 bg-white/10"></div>
<div class="flex flex-col items-center gap-2">
<span class="font-label-sm text-[9px] text-white/30 uppercase tracking-[0.15em] font-light">Don't have an account?</span>
<button class="font-label-sm text-[10px] text-white/70 hover:text-white transition-colors tracking-[0.2em] uppercase font-medium border-b border-white/20 pb-0.5" type="button">
                                Create Account
                            </button>
</div>
</div>
</div>
</form>
</div>
</main>
<!-- Minimal Footer -->
<footer class="fixed bottom-8 w-full z-10 text-center">
<p class="font-label-sm text-[9px] tracking-[0.4em] text-white/30 uppercase font-light">© NIVASA MMXXIV</p>
</footer>
<!-- Decorative Edge Accents -->
<div class="fixed inset-0 pointer-events-none z-50 overflow-hidden">
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
</div>
